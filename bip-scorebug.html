<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ball in Play — Scorebug</title>
<style>
@font-face {
  font-family: 'Refrigerator Deluxe';
  src: url('Refrigerator_Deluxe.otf') format('opentype');
  font-weight: 100 900;
}
html, body {
  margin: 0; padding: 0;
  background: transparent;
  width: 100%; height: 100%;
  overflow: hidden;
}
* { box-sizing: border-box; }

.root {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Refrigerator Deluxe', sans-serif;
  font-weight: 700;
}

/* ── Outer wrapper — white box is the base ── */
.bug {
  display: flex;
  align-items: stretch;
  position: relative;
  background: #e5e5e5 !important;
  border-radius: 4px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity .5s ease, transform .5s ease;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.55));
  height: 160px;
  gap: 0;
}
.bug.show { opacity: 1; transform: translateY(0); }

/* ── Col 1: Logos fill full height, touch score boxes ── */
.col-logos {
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 2;
  gap: 0;
  width: 120px;
}
.logo-box {
  width: 120px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 4px;
}

/* ── Col 2: Score boxes full height ── */
.col-scores {
  display: flex;
  flex-direction: column;
  gap: 0;
  flex-shrink: 0;
  z-index: 2;
}
.score-box {
  width: 90px;
  height: 80px;
  background: #111111;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.score-num {
  font-size: 58px;
  font-weight: 900;
  color: #ffffff;
  line-height: 1;
  letter-spacing: -.02em;
}
.score-num.flash {
  animation: scoreFlash .6s ease forwards;
}
@keyframes scoreFlash {
  0%   { transform: scale(1.4); }
  60%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* ── Col 3: Info ── */
.col-info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 0 20px;
  flex: 1;
  z-index: 2;
  align-self: stretch;
  gap: 8px;
}
.info-row {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.info-num {
  font-size: 36px;
  font-weight: 900;
  color: #000000;
  line-height: 1;
}
.info-label {
  font-size: 36px;
  font-weight: 800;
  color: #000000;
  letter-spacing: .04em;
  text-transform: uppercase;
  line-height: 1;
}
.outs-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.out-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.15);
  border: 1.5px solid rgba(0,0,0,0.25);
  transition: background .2s, border-color .2s;
  flex-shrink: 0;
}
.out-dot.out {
  background: #e8291c;
  border-color: #c01e10;
}
  color: #000000;
  letter-spacing: .04em;
  text-transform: uppercase;
  line-height: 1;
}

/* ── Config ── */
.config {
  position: fixed;
  top: 16px; right: 16px;
  background: rgba(6,8,12,0.96);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 8px;
  padding: 16px;
  width: 300px;
  font-family: 'Refrigerator Deluxe', sans-serif;
  z-index: 999;
}
.config h3 { margin:0 0 12px; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,0.38); }
.sdot { width:6px; height:6px; border-radius:50%; background:#22c55e; flex-shrink:0; }
.sdot.wait { background:#f59e0b; }
.sdot.err  { background:#ef4444; }
body.obs-mode .config { display: none; }
</style>
</head>
<body>

<div class="root">
  <div class="bug" id="bug">

    <!-- Logos -->
    <div class="col-logos">
      <div class="logo-box batting" id="badge-top">
        <img id="team-top-logo" src="" alt="">
      </div>
      <div class="logo-box" id="badge-bot">
        <img id="team-bot-logo" src="" alt="">
      </div>
    </div>

    <!-- Scores -->
    <div class="col-scores">
      <div class="score-box" id="score-box-top">
        <span class="score-num" id="score-top">0</span>
      </div>
      <div class="score-box" id="score-box-bot">
        <span class="score-num" id="score-bot">0</span>
      </div>
    </div>

    <!-- Info block -->
    <div class="col-info">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex:1;">
        <div class="info-row">
          <span class="info-label">Inning</span>
          <span class="info-num" id="inning-val">1</span>
        </div>
        <div class="info-row">
          <span class="info-num" id="overs-val">0.0</span>
          <span class="info-label">Overs</span>
        </div>
        <div class="outs-row" style="margin-top:4px;">
          <div class="out-dot" id="out-1"></div>
          <div class="out-dot" id="out-2"></div>
          <div class="out-dot" id="out-3"></div>
          <div class="out-dot" id="out-4"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Config -->
<div class="config" id="config">
  <h3>⚾ Ball in Play — Scorebug</h3>
  <label style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:3px;">Data URL</label>
  <input type="text" id="sheet-url" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e0e6ee;font-size:11px;padding:7px 8px;margin-bottom:8px;font-family:'Barlow',sans-serif;" placeholder="Paste Apps Script URL…">
  <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.3);">
    <div class="sdot wait" id="sdot"></div>
    <span id="stext">Waiting…</span>
  </div>
</div>

<script>
const LOGO_BASE = 'https://chrisgrimm-jm.github.io/BIP_Scorebug/';
const TEAM_LOGOS = {
  'Forgotten Rotten': 'rotten.png',
  'MacFlurry Power':  'macflurry.png',
  'Del Caribe':       'caribe.png',
  'Team Baggage':     'baggage.png',
  'Woogas':           'woogas.png',
  'We Got Ice':       'wegotice.png',
};
function getLogoUrl(name) {
  const f = TEAM_LOGOS[name];
  return f ? LOGO_BASE + f : '';
}

const DATA_URL = 'https://script.google.com/macros/s/AKfycbwbd9kVPtpdda6AijQb_DaZ5Yk38ycjjHwbahMKrdc_FffSUMP--8YpRbwmCLL9t3U2Hg/exec';
let prevScores = {};
let pollTimer = null;
const REFRESH_MS = 200;

function setSt(type, msg) {
  document.getElementById('sdot').className = 'sdot ' + (type === 'ok' ? '' : type);
  document.getElementById('stext').textContent = msg;
}

async function fetchSheet() {
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      const r = await fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store', redirect: 'follow' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      render({
        team1Name:   d['Team1Name']            || 'Team 1',
        team1Runs:   parseInt(d['Team1Runs'])   || 0,
        team2Name:   d['Team2Name']            || 'Team 2',
        team2Runs:   parseInt(d['Team2Runs'])   || 0,
        inning:      parseInt(d['Inning'])      || 1,
        overs:       `${parseInt(d['Overs']) || 0}.${parseInt(d['Balls in Over']) || 0}`,
        outs:        parseInt(d['Outs'])        || 0,
        battingTeam: parseInt(d['BattingTeam']) || 1,
      });
      setSt('ok', `Updated ${new Date().toLocaleTimeString()}`);
      return;
    } catch(e) {
      if (attempt === 3) setSt('err', `Error: ${e.message}`);
    }
  }
}

function render(d) {
  document.getElementById('team-top-logo').src = getLogoUrl(d.team1Name);
  document.getElementById('team-bot-logo').src = getLogoUrl(d.team2Name);

  const topEl = document.getElementById('score-top');
  const botEl = document.getElementById('score-bot');
  if (prevScores.t1 !== undefined && d.team1Runs > prevScores.t1) flashEl(topEl);
  if (prevScores.t2 !== undefined && d.team2Runs > prevScores.t2) flashEl(botEl);
  topEl.textContent = d.team1Runs;
  botEl.textContent = d.team2Runs;

  const batting1 = d.battingTeam === 1;
  document.getElementById('badge-top').classList.toggle('batting', batting1);
  document.getElementById('badge-bot').classList.toggle('batting', !batting1);

  document.getElementById('inning-val').textContent = d.inning;
  document.getElementById('overs-val').textContent = d.overs;

  for (let i = 1; i <= 4; i++) {
    document.getElementById(`out-${i}`).classList.toggle('out', i <= d.outs);
  }

  document.getElementById('bug').classList.add('show');
  prevScores = { t1: d.team1Runs, t2: d.team2Runs };
}

function flashEl(el) {
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}

document.getElementById('sheet-url').addEventListener('change', () => {
  clearInterval(pollTimer);
  fetchSheet();
  pollTimer = setInterval(fetchSheet, REFRESH_MS);
});

if (new URLSearchParams(location.search).get('obs') === '1') {
  document.body.classList.add('obs-mode');
}

document.getElementById('bug').classList.add('show');
fetchSheet();
pollTimer = setInterval(fetchSheet, REFRESH_MS);
</script>
</body>
</html>
