<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ball in Play — Scorebug</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
html, body {
  margin: 0; padding: 0;
  background: transparent;
  width: 100%; height: 100%;
  overflow: hidden;
}
* { box-sizing: border-box; }

/* ── Position: bottom-centre like the reference ── */
.root {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Barlow', sans-serif;
  font-weight: 700;
}

/* ── Outer wrapper ── */
.bug {
  display: flex;
  align-items: stretch;
  gap: 3px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity .5s ease, transform .5s ease;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.75));
}
.bug.show { opacity: 1; transform: translateY(0); }

/* ── Column 1: Team logos/colours stacked ── */
.col-teams {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.team-badge {
  width: 54px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}
.team-badge-inner {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 900;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: .02em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
/* Top team — transparent, logo only */
.team-badge.top    { background: transparent; }
/* Bottom team — transparent, logo only */
.team-badge.bottom { background: transparent; }

/* Active (batting) team gets a white left border accent */
.team-badge.batting::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: #ffffff;
  border-radius: 4px 0 0 4px;
}

.team-logo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 4px;
}
  object-fit: contain;
  padding: 2px;
}

/* ── Column 2: Scores stacked ── */
.col-scores {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.score-box {
  width: 70px;
  height: 50px;
  background: #1a1a1a;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.score-box.batting {
  background: #ffffff;
}
.score-num {
  font-size: 36px;
  font-weight: 900;
  color: #ffffff;
  line-height: 1;
  letter-spacing: -.02em;
  transition: color .2s;
}
.score-box.batting .score-num {
  color: #000000;
}
.score-num.flash {
  animation: scoreFlash .7s ease forwards;
}
@keyframes scoreFlash {
  0%   { transform: scale(1.4); }
  60%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* ── Column 3: Inning / Overs / Balls / Outs — tall single block ── */
.col-info {
  background: #1a1a1a;
  border-radius: 4px;
  width: 148px;
  height: 103px; /* matches both score boxes + gap */
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 0 14px;
  gap: 2px;
  flex-shrink: 0;
}

.info-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  white-space: nowrap;
}
.info-label {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  letter-spacing: .1em;
  text-transform: uppercase;
}
.info-value {
  font-size: 18px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: .01em;
  line-height: 1;
}
.info-divider {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.1);
  margin: 3px 0;
}

/* ── Balls dots ── */
.balls-row {
  display: flex;
  align-items: center;
  gap: 5px;
}
.ball-dot {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.25);
  transition: background .25s, border-color .25s;
  flex-shrink: 0;
}
.ball-dot.bowled {
  background: #e8291c;
  border-color: #c01e10;
}

/* ── Outs dots ── */
.outs-row {
  display: flex;
  align-items: center;
  gap: 5px;
}
.out-dot {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.25);
  transition: background .25s, border-color .25s;
  flex-shrink: 0;
}
.out-dot.out {
  background: #f5c842;
  border-color: #d4a010;
}

.config {
  position: fixed;
  top: 16px; right: 16px;
  background: rgba(6,8,12,0.96);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 8px;
  padding: 16px;
  width: 300px;
  font-family: 'Barlow', sans-serif;
  z-index: 999;
}
.config h3 {
  margin: 0 0 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.38);
}
.sdot { width:6px; height:6px; border-radius:50%; background:#22c55e; flex-shrink:0; }
.sdot.wait { background:#f59e0b; }
.sdot.err  { background:#ef4444; }
body.obs-mode .config { display: none; }
</style>
</head>
<body>

<!-- ── SCOREBUG ── -->
<div class="root">
  <div class="bug" id="bug">

    <!-- Col 1: Team badges -->
    <div class="col-teams">
      <div class="team-badge top batting" id="badge-top">
        <img class="team-logo" id="team-top-logo" src="" alt="">
      </div>
      <div class="team-badge bottom" id="badge-bot">
        <img class="team-logo" id="team-bot-logo" src="" alt="">
      </div>
    </div>

    <!-- Col 2: Scores -->
    <div class="col-scores">
      <div class="score-box batting" id="score-box-top">
        <span class="score-num" id="score-top">0</span>
      </div>
      <div class="score-box" id="score-box-bot">
        <span class="score-num" id="score-bot">0</span>
      </div>
    </div>

    <!-- Col 3: Info panel -->
    <div class="col-info">
      <div class="info-row">
        <span class="info-label">Inning</span>
        <span class="info-value" id="inning-val">1</span>
        <span class="info-label" style="margin-left:10px">Overs</span>
        <span class="info-value" id="overs-val">0.0</span>
      </div>
      <div class="info-divider"></div>
      <div class="info-row" style="gap:4px; margin-top:2px">
        <span class="info-label" style="margin-right:2px">Outs</span>
        <div class="outs-row" id="outs-dots">
          <div class="out-dot"></div>
          <div class="out-dot"></div>
          <div class="out-dot"></div>
          <div class="out-dot"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── CONFIG PANEL ── -->
<div class="config" id="config">
  <h3>⚾ Ball in Play — Scorebug</h3>
  <label style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:3px;">Data URL</label>
  <input type="text" id="sheet-url" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e0e6ee;font-size:11px;padding:7px 8px;margin-bottom:8px;font-family:'Barlow',sans-serif;" placeholder="Paste CSV or Apps Script URL…">
  <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.3);">
    <div class="sdot wait" id="sdot" style="width:6px;height:6px;border-radius:50%;background:#f59e0b;flex-shrink:0;"></div>
    <span id="stext">Waiting…</span>
  </div>
</div>


<script>
const LOGO_BASE = 'https://chrisgrimm-jm.github.io/BIP_Scorebug/';
const TEAM_LOGOS = {
  'Forgotten Rotten': 'Rotten.png',
  'MacFlurry Power':  'Macflurry.png',
  'Del Caribe':       'Del%20Caribe.png',
  'Baggage':          'Baggage.png',
  'Woogas':           'Woogs.png',
  'Ice':              'Ice.png',
};

function getLogoUrl(teamName) {
  const file = TEAM_LOGOS[teamName];
  return file ? LOGO_BASE + file : '';
}

const DATA_URL = 'https://script.google.com/macros/s/AKfycbwbd9kVPtpdda6AijQb_DaZ5Yk38ycjjHwbahMKrdc_FffSUMP--8YpRbwmCLL9t3U2Hg/exec';
let prevScores = {};
let pollTimer = null;
const REFRESH_MS = 2000;

function setSt(type, msg) {
  document.getElementById('sdot').className = 'sdot ' + (type === 'ok' ? '' : type);
  document.getElementById('stext').textContent = msg;
}

// ── Fetch ─────────────────────────────────────────────────────────────────
async function fetchSheet() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now(), {
      cache: 'no-store',
      redirect: 'follow'
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    render({
      team1Name:   d['Team1Name']          || 'Team 1',
      team1Runs:   parseInt(d['Team1Runs'])     || 0,
      team2Name:   d['Team2Name']          || 'Team 2',
      team2Runs:   parseInt(d['Team2Runs'])     || 0,
      inning:      parseInt(d['Inning'])        || 1,
      overs:       `${parseInt(d['Overs']) || 0}.${parseInt(d['Balls in Over']) || 0}`,
      ballsInOver: parseInt(d['Balls in Over']) || 0,
      outs:        parseInt(d['Outs'])          || 0,
      battingTeam: parseInt(d['BattingTeam'])   || 1,
      team1Logo:   d['Team1Logo']               || '',
      team2Logo:   d['Team2Logo']               || '',
    });
    setSt('ok', `Updated ${new Date().toLocaleTimeString()}`);
  } catch(e) {
    setSt('err', `Error: ${e.message}`);
  }
}

// ── Render ───────────────────────────────────────────────────────────────
function render(d) {
  // Team logos — clean URL in case it has extra wrapping
  const logo1 = getLogoUrl(d.team1Name);
  const logo2 = getLogoUrl(d.team2Name);
  const topLogo = document.getElementById('team-top-logo');
  const botLogo = document.getElementById('team-bot-logo');
  if (logo1) { topLogo.src = logo1; topLogo.style.display = 'block'; }
  else { topLogo.style.display = 'none'; }
  if (logo2) { botLogo.src = logo2; botLogo.style.display = 'block'; }
  else { botLogo.style.display = 'none'; }

  // Scores with flash on change
  const topEl = document.getElementById('score-top');
  const botEl = document.getElementById('score-bot');
  if (prevScores.t1 !== undefined && d.team1Runs > prevScores.t1) flashEl(topEl);
  if (prevScores.t2 !== undefined && d.team2Runs > prevScores.t2) flashEl(botEl);
  topEl.textContent = d.team1Runs;
  botEl.textContent = d.team2Runs;

  // Batting team highlight
  const batting1 = d.battingTeam === 1;
  document.getElementById('badge-top').classList.toggle('batting', batting1);
  document.getElementById('badge-bot').classList.toggle('batting', !batting1);
  document.getElementById('score-box-top').classList.toggle('batting', batting1);
  document.getElementById('score-box-bot').classList.toggle('batting', !batting1);
  topEl.style.color = batting1 ? '#000000' : '#ffffff';
  botEl.style.color = !batting1 ? '#000000' : '#ffffff';

  // Inning & Overs
  document.getElementById('inning-val').textContent = d.inning;
  document.getElementById('overs-val').textContent = d.overs;

  // Balls dots (6 per over, red = bowled)
  const ballDots = document.querySelectorAll('#balls-dots .ball-dot');
  ballDots.forEach((dot, i) => {
    dot.classList.toggle('bowled', i < d.ballsInOver);
  });

  // Outs dots (4 per inning, yellow = out)
  const outDots = document.querySelectorAll('#outs-dots .out-dot');
  outDots.forEach((dot, i) => {
    dot.classList.toggle('out', i < d.outs);
  });

  document.getElementById('bug').classList.add('show');
  prevScores = { t1: d.team1Runs, t2: d.team2Runs };
}

function flashEl(el) {
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

document.getElementById('sheet-url').addEventListener('change', () => {
  clearInterval(pollTimer);
  fetchSheet();
  pollTimer = setInterval(fetchSheet, REFRESH_MS);
});

if (new URLSearchParams(location.search).get('obs') === '1') {
  document.body.classList.add('obs-mode');
}

document.getElementById('bug').classList.add('show');
fetchSheet();
pollTimer = setInterval(fetchSheet, REFRESH_MS);
</script>
</body>
</html>
